name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      SITE_SLUG: zenzi-cafe
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm install --legacy-peer-deps --no-fund

      - name: Prep image paths in source code
        run: |
          echo "Prepending /$SITE_SLUG to image paths in src/..."
          find src -type f \( -name "*.tsx" -o -name "*.ts" -o -name "*.css" -o -name "*.js" \) | while read f; do
            sed -i "s|/images/|/$SITE_SLUG/images/|g" "$f"
          done
          echo "Done prepending."

      - name: Build static export
        run: npm run build

      - uses: actions/upload-pages-artifact@v3
        with:
          path: out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
